<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日韓代購快速報價計算機</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { text-align: center; margin-top: 0; color: #2c3e50; font-size: 22px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .currency-toggle { display: flex; background-color: #edf2f7; padding: 4px; border-radius: 8px; margin-bottom: 15px; }
        .currency-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 15px; font-weight: bold; color: #4a5568; cursor: pointer; border-radius: 6px; }
        .currency-btn.active { background-color: #fff; color: #2b6cb0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bot-hint-box { background-color: #f7fafc; border: 1px dashed #cbd5e0; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #4a5568; text-align: center; }
        .bot-hint-box strong { color: #e53e3e; font-size: 15px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #4a5568; }
        .input-group { display: flex; align-items: center; }
        input[type="number"], select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; outline: none; }
        .unit { margin-left: 8px; font-size: 14px; color: #718096; width: 45px; flex-shrink: 0; }
        .result-box { background-color: #ebf8ff; border: 1px solid #bee3f8; border-radius: 8px; padding: 15px; margin-top: 20px; text-align: center; }
        .result-title { font-size: 14px; color: #2b6cb0; margin-bottom: 5px; }
        .result-price { font-size: 28px; font-weight: bold; color: #2b6cb0; }
        .detail-box { margin-top: 15px; background-color: #f7fafc; border-radius: 8px; padding: 12px; font-size: 13px; color: #4a5568; line-height: 1.6; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗺️ 日韓代購快速報價</h2>
    
    <!-- 幣別切換 -->
    <div class="currency-toggle">
        <button class="currency-btn active" id="btn-jpy" onclick="switchCurrency('jpy')">🇯🇵 日本 (JPY)</button>
        <button class="currency-btn" id="btn-krw" onclick="switchCurrency('krw')">🇰🇷 韓國 (KRW)</button>
    </div>
    
    <!-- 台灣銀行公布之固定參考值區塊 -->
    <div class="bot-hint-box">
        🏛️ 台灣銀行本日公布參考匯率：<strong id="bankRefRate">0.2002</strong>
    </div>
    
    <div class="form-group">
        <label id="priceLabel" for="foreignPrice">商品日幣售價 (含稅)</label>
        <div class="input-group">
            <input type="number" id="foreignPrice" placeholder="請輸入金額" oninput="calculateQuote()">
            <span class="unit" id="currencyUnit">JPY</span>
        </div>
    </div>

    <div class="form-group">
        <label for="exchangeRate">當前計算匯率 (可隨時修改)</label>
        <div class="input-group">
            <input type="number" id="exchangeRate" value="0.2000" step="0.0001" oninput="calculateQuote()">
            <span class="unit">台幣</span>
        </div>
    </div>

    <div class="form-group">
        <label for="cardFee">海外刷卡手續費</label>
        <div class="input-group">
            <input type="number" id="cardFee" value="1.5" step="0.1" oninput="calculateQuote()">
            <span class="unit">%</span>
        </div>
    </div>

    <div class="form-group">
        <label>利潤設定方式</label>
        <select id="profitSelect" onchange="toggleProfitInput()">
            <option value="percent">按商品常規成數 (加 %)</option>
            <option value="fixed">固定收取代購費 (元)</option>
        </select>
        <div style="margin-top: 10px;">
            <div class="input-group" id="profitPercentGroup">
                <input type="number" id="profitPercent" value="10" step="1" oninput="calculateQuote()">
                <span class="unit">%</span>
            </div>
            <div class="input-group" id="profitFixedGroup" style="display: none;">
                <input type="number" id="profitFixed" value="100" step="1" oninput="calculateQuote()">
                <span class="unit">TWD</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="shippingFee">國內外運費 / 包材費</label>
        <div class="input-group">
            <input type="number" id="shippingFee" value="0" step="1" oninput="calculateQuote()">
            <span class="unit">TWD</span>
        </div>
    </div>

    <div class="result-box">
        <div class="result-title">建議對客報價 (無條件進位)</div>
        <div class="result-price" id="finalQuote">NT$ 0</div>
    </div>

    <div class="detail-box">
        <div class="detail-row"><span>商品台幣成本：</span><span id="costTwd">NT$ 0</span></div>
        <div class="detail-row"><span>刷卡手續費：</span><span id="feeTwd">NT$ 0</span></div>
        <div class="detail-row"><span>您的預估利潤：</span><span id="profitTwd">NT$ 0</span></div>
    </div>
</div>

<script>
    let currentCurrency = 'jpy';

    function switchCurrency(type) {
        currentCurrency = type;
        
        document.getElementById('btn-jpy').classList.remove('active');
        document.getElementById('btn-krw').classList.remove('active');
        document.getElementById('btn-' + type).classList.add('active');
        
        if (type === 'jpy') {
            document.getElementById('priceLabel').innerText = "商品日幣售價 (含稅)";
            document.getElementById('currencyUnit').innerText = "JPY";
            document.getElementById('exchangeRate').value = "0.2000";
            document.getElementById('bankRefRate').innerText = "0.2002";
        } else {
            document.getElementById('priceLabel').innerText = "商品韓元售價 (含稅)";
            document.getElementById('currencyUnit').innerText = "KRW";
            document.getElementById('exchangeRate').value = "0.0240";
            document.getElementById('bankRefRate').innerText = "0.0228";
        }
        calculateQuote();
    }

    function toggleProfitInput() {
        let type = document.getElementById('profitSelect').value;
        if (type === 'percent') {
            document.getElementById('profitPercentGroup').style.display = 'flex';
            document.getElementById('profitFixedGroup').style.display = 'none';
        } else {
            document.getElementById('profitPercentGroup').style.display = 'none';
            document.getElementById('profitFixedGroup').style.display = 'flex';
        }
        calculateQuote();
    }

    function calculateQuote() {
        let foreignPrice = parseFloat(document.getElementById('foreignPrice').value) || 0;
        let exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 0;
        let cardFeePercent = parseFloat(document.getElementById('cardFee').value) || 0;
        let profitType = document.getElementById('profitSelect').value;
        let shippingFee = parseFloat(document.getElementById('shippingFee').value) || 0;

        if (foreignPrice === 0) {
            document.getElementById('finalQuote').innerText = "NT$ 0";
            document.getElementById('costTwd').innerText = "NT$ 0";
            document.getElementById('feeTwd').innerText = "NT$ 0";
            document.getElementById('profitTwd').innerText = "NT$ 0";
            return;
        }

        let costTwd = foreignPrice * exchangeRate;
        let feeTwd = costTwd * (cardFeePercent / 100);

        let profitTwd = 0;
        if (profitType === 'percent') {
            let profitPercent = parseFloat(document.getElementById('profitPercent').value) || 0;
            profitTwd = costTwd * (profitPercent / 100);
        } else {
            profitTwd = parseFloat(document.getElementById('profitFixed').value) || 0;
        }

        let total = costTwd + feeTwd + profitTwd + shippingFee;
        let finalQuote = Math.ceil(total);

        document.getElementById('finalQuote').innerText = "NT$ " + finalQuote.toLocaleString();
        document.getElementById('costTwd').innerText = "NT$ " + Math.round(costTwd).toLocaleString();
        document.getElementById('feeTwd').innerText = "NT$ " + Math.round(feeTwd).toLocaleString();
        document.getElementById('profitTwd').innerText = "NT$ " + Math.round(profitTwd).toLocaleString();
    }
</script>

</body>
</html>
