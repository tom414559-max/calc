<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日韓代購全自動報價計算機</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }
        .currency-toggle {
            display: flex;
            background-color: #edf2f7;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .currency-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #4a5568;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .currency-btn.active {
            background-color: #fff;
            color: #2b6cb0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }
        .input-group {
            display: flex;
            align-items: center;
        }
        input[type="number"], select {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus, select:focus {
            border-color: #3182ce;
        }
        .unit {
            margin-left: 8px;
            font-size: 14px;
            color: #718096;
            width: 45px;
        }
        .result-box {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .result-title {
            font-size: 14px;
            color: #2b6cb0;
            margin-bottom: 5px;
        }
        .result-price {
            font-size: 28px;
            font-weight: bold;
            color: #2b6cb0;
        }
        .detail-box {
            margin-top: 15px;
            background-color: #f7fafc;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #4a5568;
            line-height: 1.6;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .api-status {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🗺️ 日韓代購快速報價</h2>
    
    <div class="currency-toggle">
        <button class="currency-btn active" id="btn-jpy" onclick="switchCurrency('jpy')">🇯🇵 日本 (JPY)</button>
        <button class="currency-btn" id="btn-krw" onclick="switchCurrency('krw')">🇰🇷 韓國 (KRW)</button>
    </div>
    
    <div class="api-status" id="apiStatus">正在同步最新網路即時匯率...</div>
    
    <div class="form-group">
        <label id="priceLabel" for="foreignPrice">商品日幣售價 (含稅)</label>
        <div class="input-group">
            <input type="number" id="foreignPrice" placeholder="請輸入金額" oninput="calculateQuote()">
            <span class="unit" id="currencyUnit">JPY</span>
        </div>
    </div>

    <div class="form-group">
        <label for="exchangeRate">當前匯率 (已加外加保護)</label>
        <div class="input-group">
            <input type="number" id="exchangeRate" value="0.2150" step="0.0001" oninput="calculateQuote()">
            <span class="unit">台幣</span>
        </div>
    </div>

    <div class="form-group">
        <label for="cardFee">海外刷卡手續費</label>
        <div class="input-group">
            <input type="number" id="cardFee" value="1.5" step="0.1" oninput="calculateQuote()">
            <span class="unit">%</span>
        </div>
    </div>

    <div class="form-group">
        <label for="profitType">利潤設定方式</label>
        <select id="profitType" style="width:100%; padding:10px; border-radius:6px; border:1px solid #cbd5e0; font-size:16px; margin-bottom:12px;" onchange="toggleProfitInput()">
            <option value="percent">按商品常規成數 (加 %)</option>
            <option value="fixed">固定收取代購費 (元)</option>
        </select>
        
        <div class="input-group" id="profitPercentGroup">
            <input type="number" id="profitPercent" value="10" step="1" oninput="calculateQuote()">
            <span class="unit">%</span>
        </div>
        <div class="input-group" id="profitFixedGroup" style="display: none;">
            <input type="number" id="profitFixed" value="100" step="1" oninput="calculateQuote()">
            <span class="unit">TWD</span>
        </div>
    </div>

    <div class="form-group">
        <label for="shippingFee">國內外運費 / 包材費</label>
        <div class="input-group">
            <input type="number" id="shippingFee" value="0" step="1" oninput="calculateQuote()">
            <span class="unit">TWD</span>
        </div>
    </div>

    <div class="result-box">
        <div class="result-title">建議對客報價 (無條件進位)</div>
        <div class="result-price" id="finalQuote">NT$ 0</div>
    </div>

    <div class="detail-box">
        <div class="detail-row"><span>商品台幣成本：</span><span id="costTwd">NT$ 0</span></div>
        <div class="detail-row"><span>刷卡手續費：</span><span id="feeTwd">NT$ 0</span></div>
        <div class="detail-row"><span>您的預估利潤：</span><span id="profitTwd">NT$ 0</span></div>
    </div>
</div>

<script>
    // ✦ 這裡設定您的代購水外（外加匯差）防止虧損 ✦
    const rateBuffer = {
        jpy: 0.0050, // 自動抓到的日幣匯率 + 0.005 (例如 0.2110 變 0.2160)
        krw: 0.0010  // 自動抓到的韓元匯率 + 0.001 (例如 0.0240 變 0.0251)
    };

    // 萬一網路連不上時的「備用保底匯率」
    let fetchedRates = {
        jpy: 0.2150,
        krw: 0.0245
    };
    
    let currentCurrency = 'jpy';

    // 網頁一打開，自動去抓最新的銀行即時匯率
    async function fetchLiveRates() {
        try {
            const response = await fetch('https://er-api.com');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            // 轉換匯率公式並加上安全水外
            fetchedRates.jpy = parseFloat(((1 / data.rates.JPY) + rateBuffer.jpy).toFixed(4));
            fetchedRates.krw = parseFloat(((1 / data.rates.KRW) + rateBuffer.krw).toFixed(4));
            
            document.getElementById('apiStatus').innerText = "🟢 已成功同步今天最新網路匯率 (已自動外加安全匯差)";
            document.getElementById('exchangeRate').value = fetchedRates.jpy;
        } catch (error) {
            document.getElementById('apiStatus').innerText = "🔴 無法連線網路匯率，已自動切換為本機保底匯率";
            document.getElementById('exchangeRate').value = fetchedRates.jpy;
        }
        calculateQuote();
    }

    function switchCurrency(type) {
        currentCurrency = type;
        document.getElementById('btn-jpy').classList.remove('active');
        document.getElementById('btn-krw').classList.remove('active');
        document.getElementById('btn-' + type).classList.add('active');
        
        if (type === 'jpy') {
            document.getElementById('priceLabel').innerText = "商品日幣售價 (含稅)";
            document.getElementById('currencyUnit').innerText = "JPY";
            document.getElementById('exchangeRate').value = fetchedRates.jpy;
        } else {
            document.getElementById('priceLabel').innerText = "商品韓元售價 (含稅)";
            document.getElementById('currencyUnit').innerText = "KRW";
            document.getElementById('exchangeRate').value = fetchedRates.krw;
        }
        calculateQuote();
    }

    function toggleProfitInput() {
        const type = document.getElementById('profitType').value;
        if (type === 'percent') {
            document.getElementById('profitPercentGroup').style.display = 'flex';
            document.getElementById('profitFixedGroup').style.display = 'none';
        } else {
            document.getElementById('profitPercentGroup').style.display = 'none';
            document.getElementById('profitFixedGroup').style.display = 'flex';
        }
        calculateQuote();
    }

    function calculateQuote() {
        const foreignPrice = parseFloat(document.getElementById('foreignPrice').value) || 0;
        const exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 0;
        const cardFeePercent = parseFloat(document.getElementById('cardFee').value) || 0;
        const profitType = document.getElementById('profitType').value;
        const shippingFee = parseFloat(document.getElementById('shippingFee').value) || 0;

        if (foreignPrice === 0) {
            document.getElementById('finalQuote').innerText = "NT$ 0";
            document.getElementById('costTwd').innerText = "NT$ 0";
            document.getElementById('feeTwd').innerText = "NT$ 0";
            document.getElementById('profitTwd').innerText = "NT$ 0";
            return;
        }

        const costTwd = foreignPrice * exchangeRate;
        const feeTwd = costTwd * (cardFeePercent / 100);

        let profitTwd = 0;
